<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML5</title>
</head>
<body>
    <h1>Colocando vídeos hospedados localmente</h1>
    <p>abaixo haverá dois videos, que estão hospedados no meu servidor</p>
    <video src="media/vivo-turbo.mp4" width="640" poster="imgs/vivo.png" controls></video> <!--jeito mais simples de colocar um video em seu site-->
    <br>
    <video width="640" controls>
        <source src="media/putin-walk.mp4" type="video/mp4">
        <source src="media/putin-walk.webm" type="video/webm">
        <source src="media/putin-walk.mkv" type="video/mp4">
        <p>infelizmente seu navegador não tem compatibilidade com os formatos desse vídeo</p>
    </video>

    <h1>Inserindo vídeos externos</h1>
    <h2>Colocando vídeos do youtube</h2>
    <iframe width="640" height="315" src="https://www.youtube.com/embed/rdcXBchDXY8?si=ly2A97M90IvX0t-k" title="YouTube video player" frameborder="0" allow="accelerometer;
    autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Colocando vídeos do tiktok</h2>
    
</body>
</html>
