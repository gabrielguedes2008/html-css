<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            margin: auto;
            border-radius: 25px;
            box-shadow: 1px 1px 7px rgba(0, 0, 0, 0.432);
            transition-duration: .5s;
        }

        .box:hover {
            width: 210px;
            height: 210px;
            background-color: rgba(240, 128, 128, 0.247);
        }
    </style>
</head>
<body>
    <a href="#">
        <div class="box"></div>
    </a>
</body>
</html>
